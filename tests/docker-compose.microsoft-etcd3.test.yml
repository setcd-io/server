services:
  test:
    depends_on:
      - etcd
    image: node:18
    network_mode: host
    volumes:
      - ./.cache/microsoft-etcd3:/test
      - ./server/certs/localhost.crt:/test/src/test/certs/certs/ca.crt
      - ./server/certs/localhost.crt:/test/src/test/certs/certs/etcd0.localhost.crt
      - ./server/certs/localhost.key:/test/src/test/certs/private/etcd0.localhost.key
    env_file:
      - ./.cache/microsoft-etcd3.env
    working_dir: /test
    command: >
      sh -c "env && npm install && ./node_modules/.bin/mocha --verbose --bail --grep \"$$TESTS\""

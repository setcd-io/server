services:
  test:
    tty: true
    depends_on:
      etcd:
        condition: service_healthy
    image: node:18
    network_mode: host
    volumes:
      - ./.cache/microsoft-etcd3:/test
      - ./src/certs/ca.crt:/test/src/test/certs/certs/ca.crt
      - ./src/certs/localhost.crt:/test/src/test/certs/certs/etcd0.localhost.crt
      - ./src/certs/localhost.key:/test/src/test/certs/private/etcd0.localhost.key
    env_file:
      - ./.cache/microsoft-etcd3.env
    working_dir: /test
    command: >
      sh -c "npm install && ./node_modules/.bin/mocha --verbose --grep \"$$TESTS\" # --bail"

services:
  etcd:
    image: quay.io/coreos/etcd:v3.6.4
    environment:
      - ETCDCTL_CACERT=/certs/ca.crt
      - ETCDCTL_CERT=/certs/localhost.crt
      - ETCDCTL_KEY=/certs/localhost.key
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "status"]
      interval: 1s
      retries: 60
    ports:
      - "2379:2379"
    volumes:
      - ./src/certs:/certs
    command:
      - /usr/local/bin/etcd
      - --listen-client-urls=https://0.0.0.0:2379
      - --advertise-client-urls=https://etcd:2379
      - --initial-cluster-token=etcd-cluster-1
      - --initial-cluster-state=new
      - --cert-file=/certs/localhost.crt
      - --key-file=/certs/localhost.key

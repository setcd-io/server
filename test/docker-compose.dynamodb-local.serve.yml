version: "3.8"
services:
  ddb:
    image: amazon/dynamodb-local:2.6.1
    command: "-jar DynamoDBLocal.jar -sharedDb"
    ports:
      - "8000:8000"
  etcd:
    tty: true
    build:
      context: .
      dockerfile: Dockerfile
      # Use the JS Build for local execution
      target: full
    environment:
      - SETCD_VERBOSE=true
      - ETCD_WATCH_PROGRESS_NOTIFY_INTERVAL=1s
      - ETCD_TRUSTED_CA_FILE=/certs/ca.crt
      - ETCD_CERT_FILE=/certs/localhost.crt
      - ETCD_KEY_FILE=/certs/localhost.key
      - ETCDCTL_CACERT=/certs/ca.crt
      - ETCDCTL_CERT=/certs/localhost.crt
      - ETCDCTL_KEY=/certs/localhost.key
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 1s
      retries: 60
    ports:
      - "2379:2379"
    volumes:
      - ./src/certs:/certs
    depends_on:
      - ddb
    env_file:
      - ./.cache/dynamodb-local.env

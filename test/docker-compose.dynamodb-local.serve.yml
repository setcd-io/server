version: "3.8"
services:
  ddb:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    ports:
      - "8000:8000"
    volumes:
      - ./.cache/dynamodb-local:/data
  etcd:
    build:
      context: .
      dockerfile: Dockerfile
      # Use the JS Build for local execution
      target: full
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "endpoint",
          "status",
          "--cacert=/certs/localhost.crt",
          "--cert=/certs/localhost.crt",
          "--key=/certs/localhost.key",
        ]
      interval: 1s
      retries: 60
    ports:
      - "2379:2379"
    volumes:
      - ./src/certs:/certs
    depends_on:
      - ddb
    env_file:
      - ./.cache/dynamodb-local.env

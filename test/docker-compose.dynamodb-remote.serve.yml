services:
  etcd:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "endpoint",
          "status",
          "--cacert=/certs/localhost.crt",
          "--cert=/certs/localhost.crt",
          "--key=/certs/localhost.key",
        ]
      interval: 1s
      retries: 60
    ports:
      - "2379:2379"
    volumes:
      - ./src/certs:/certs
    env_file:
      - ./.cache/dynamodb-remote.env
